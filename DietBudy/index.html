<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DietBudy – Food Database</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <div x-data x-init="$store.diet.init()" style="display:flex;flex-direction:column;height:100vh">

      <!-- ══ AUTH SCREEN ══════════════════════════════════════════ -->
      <template x-if="$store.diet.authState === 'unauthenticated'">
        <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--bg)">
          <div style="width:100%;max-width:480px">
            <div class="auth-card">
              <div class="auth-logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 2a9 9 0 0 1 9 9c0 4.17-2.84 7.67-6.7 8.67L12 22l-2.3-2.33C5.84 18.67 3 15.17 3 11A9 9 0 0 1 12 2z"/>
                  <circle cx="12" cy="11" r="3"/>
                </svg>
                <span>DietBudy</span>
              </div>
              <div x-show="$store.diet.authError" class="error-box" x-text="$store.diet.authError"></div>
              <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:4px">Welcome back</h2>
              <p style="color:var(--text3);font-size:0.85rem;margin-bottom:20px">Sign in to track your nutrition</p>
              <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" x-model="$store.diet.authEmail" @keyup.enter="$store.diet.login()" placeholder="you@example.com" />
              </div>
              <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" x-model="$store.diet.authPassword" @keyup.enter="$store.diet.login()" placeholder="••••••••" />
              </div>
              <button class="btn btn-primary" style="width:100%;justify-content:center;padding:10px 16px"
                @click="$store.diet.login()" :disabled="$store.diet.authLoading">
                <span x-show="!$store.diet.authLoading">Sign In</span>
                <span x-show="$store.diet.authLoading">Signing in…</span>
              </button>
            </div>
          </div>
        </div>
      </template>

      <!-- ══ LOADING ══════════════════════════════════════════════ -->
      <template x-if="$store.diet.authState === 'loading'">
        <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:var(--bg)">
          <div style="text-align:center;color:var(--text3)">
            <svg style="width:40px;height:40px;color:var(--accent);animation:pulse 1.5s infinite;margin-bottom:12px"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 2a9 9 0 0 1 9 9c0 4.17-2.84 7.67-6.7 8.67L12 22l-2.3-2.33C5.84 18.67 3 15.17 3 11A9 9 0 0 1 12 2z"/>
              <circle cx="12" cy="11" r="3"/>
            </svg>
            <p style="font-size:0.9rem">Loading…</p>
          </div>
        </div>
      </template>

      <!-- ══ APP SHELL ═════════════════════════════════════════════ -->
      <template x-if="$store.diet.authState === 'authenticated'">
        <div style="display:flex;flex-direction:column;height:100vh">

          <!-- ═ TOP BAR ═══════════════════════════════════════════ -->
          <header id="topbar" style="display:flex;align-items:center;gap:12px;padding:10px 20px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0">
            <!-- Sidebar toggle -->
            <button class="btn-icon" @click="$store.diet.sidebarOpen = !$store.diet.sidebarOpen" title="Toggle sidebar">
              <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 12h18M3 6h18M3 18h18"/>
              </svg>
            </button>

            <!-- Logo -->
            <div style="display:flex;align-items:center;gap:8px;font-size:1.15rem;font-weight:700;color:var(--accent);letter-spacing:-0.5px;flex-shrink:0">
              <svg style="width:24px;height:24px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 2a9 9 0 0 1 9 9c0 4.17-2.84 7.67-6.7 8.67L12 22l-2.3-2.33C5.84 18.67 3 15.17 3 11A9 9 0 0 1 12 2z"/>
                <circle cx="12" cy="11" r="3"/>
              </svg>
              DietBudy
            </div>

            <!-- Nav tabs -->
            <nav style="display:flex;gap:4px;margin-left:8px">
              <!-- Foods (active) -->
              <a href="./index.html"
                style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:4px;font-size:0.8rem;font-weight:500;color:var(--accent);background:var(--accent-bg);text-decoration:none">
                <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M12 2a9 9 0 0 1 9 9c0 4.17-2.84 7.67-6.7 8.67L12 22l-2.3-2.33C5.84 18.67 3 15.17 3 11A9 9 0 0 1 12 2z"/>
                  <circle cx="12" cy="11" r="3"/>
                </svg>
                Foods
              </a>
              <!-- Planner -->
              <a href="./planner.html"
                style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:4px;font-size:0.8rem;font-weight:500;color:var(--text3);text-decoration:none;transition:var(--trans)"
                onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
                onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
                <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="4" width="18" height="18" rx="2"/>
                  <line x1="16" y1="2" x2="16" y2="6"/>
                  <line x1="8" y1="2" x2="8" y2="6"/>
                  <line x1="3" y1="10" x2="21" y2="10"/>
                  <line x1="8" y1="14" x2="16" y2="14"/>
                </svg>
                Planner
              </a>
              <!-- Workouts (cross-app) -->
              <a href="../workout.html"
                style="display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:4px;font-size:0.8rem;font-weight:500;color:var(--text3);text-decoration:none;transition:var(--trans)"
                onmouseover="this.style.color='var(--text)';this.style.background='var(--surface2)'"
                onmouseout="this.style.color='var(--text3)';this.style.background='transparent'">
                <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="2" y="9" width="3" height="6" rx="1"/>
                  <rect x="19" y="9" width="3" height="6" rx="1"/>
                  <rect x="5" y="7" width="3" height="10" rx="1"/>
                  <rect x="16" y="7" width="3" height="10" rx="1"/>
                  <line x1="8" y1="12" x2="16" y2="12"/>
                </svg>
                Workouts
              </a>
            </nav>

            <div style="flex:1"></div>

            <!-- User + logout -->
            <div style="display:flex;align-items:center;gap:8px">
              <span style="font-size:0.8rem;color:var(--text3)" x-text="$store.diet.user?.displayName || $store.diet.user?.email?.split('@')[0]"></span>
              <button class="btn-icon" @click="$store.diet.logout()" title="Sign out">
                <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
              </button>
            </div>
          </header>

          <!-- ═ BODY ═══════════════════════════════════════════════ -->
          <div style="display:flex;flex:1;overflow:hidden;position:relative">

            <!-- Mobile overlay -->
            <div class="sidebar-mobile-overlay"
              x-show="$store.diet.sidebarOpen"
              @click="$store.diet.sidebarOpen = false"
              style="position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:40">
            </div>

            <!-- ═ SIDEBAR ════════════════════════════════════════ -->
            <aside id="sidebar" :class="{ open: $store.diet.sidebarOpen }"
              style="background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;width:240px;flex-shrink:0"
              :style="$store.diet.sidebarOpen ? '' : 'width:0;border:none'">

              <!-- Mobile header -->
              <div class="sidebar-mobile-header" style="display:none;flex-direction:column;flex-shrink:0">
                <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-bottom:1px solid var(--border)">
                  <div style="display:flex;align-items:center;gap:8px;font-size:1.1rem;font-weight:700;color:var(--accent)">
                    <svg style="width:22px;height:22px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                      <path d="M12 2a9 9 0 0 1 9 9c0 4.17-2.84 7.67-6.7 8.67L12 22l-2.3-2.33C5.84 18.67 3 15.17 3 11A9 9 0 0 1 12 2z"/>
                      <circle cx="12" cy="11" r="3"/>
                    </svg>
                    DietBudy
                  </div>
                  <button class="btn-icon" @click="$store.diet.sidebarOpen = false">
                    <svg style="width:18px;height:18px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                  </button>
                </div>
                <!-- Mobile nav -->
                <div style="display:flex;flex-direction:column;padding:8px;border-bottom:1px solid var(--border);gap:2px">
                  <a href="./index.html" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);background:var(--accent-bg);color:var(--accent);font-size:0.875rem;font-weight:600;text-decoration:none">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a9 9 0 0 1 9 9c0 4.17-2.84 7.67-6.7 8.67L12 22l-2.3-2.33C5.84 18.67 3 15.17 3 11A9 9 0 0 1 12 2z"/><circle cx="12" cy="11" r="3"/></svg>
                    Foods
                  </a>
                  <a href="./planner.html" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);color:var(--text3);font-size:0.875rem;font-weight:500;text-decoration:none">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                    Planner
                  </a>
                  <a href="../workout.html" style="display:flex;align-items:center;gap:10px;padding:12px;border-radius:var(--radius);color:var(--text3);font-size:0.875rem;font-weight:500;text-decoration:none">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="9" width="3" height="6" rx="1"/><rect x="19" y="9" width="3" height="6" rx="1"/><rect x="5" y="7" width="3" height="10" rx="1"/><rect x="16" y="7" width="3" height="10" rx="1"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
                    Workouts
                  </a>
                </div>
              </div>

              <!-- Meal Plans section -->
              <div style="padding:12px 16px;border-bottom:1px solid var(--border)">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
                  <span style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600">Meal Plans</span>
                  <a href="./planner.html" class="btn-icon" style="width:24px;height:24px" title="New meal plan">
                    <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                  </a>
                </div>
                <div style="display:flex;flex-direction:column;gap:2px">
                  <template x-for="plan in $store.diet.mealPlans" :key="plan.id">
                    <a :href="'./planner.html?plan=' + plan.id" class="sidebar-item" style="text-decoration:none;color:var(--text)">
                      <span x-text="plan.name" style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:0.85rem"></span>
                      <span style="font-size:0.7rem;color:var(--text3)" x-text="plan.targetCalories ? plan.targetCalories + ' kcal' : ''"></span>
                    </a>
                  </template>
                  <div x-show="!$store.diet.mealPlans.length" style="font-size:0.8rem;color:var(--text3);padding:8px 12px">No plans yet</div>
                </div>
              </div>

              <!-- Stats summary -->
              <div style="padding:12px 16px;flex:1">
                <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--text3);font-weight:600;margin-bottom:8px">Food Database</div>
                <div style="display:flex;flex-direction:column;gap:6px">
                  <div style="display:flex;justify-content:space-between;font-size:0.8rem">
                    <span style="color:var(--text3)">Total foods</span>
                    <span style="color:var(--text);font-weight:600" x-text="$store.diet.foods.length"></span>
                  </div>
                  <div style="display:flex;justify-content:space-between;font-size:0.8rem">
                    <span style="color:var(--text3)">Avg protein/100g</span>
                    <span style="color:var(--accent);font-weight:600" x-text="$store.diet.avgProtein + 'g'"></span>
                  </div>
                  <div style="display:flex;justify-content:space-between;font-size:0.8rem">
                    <span style="color:var(--text3)">Avg calories/100g</span>
                    <span style="color:var(--text2);font-weight:600" x-text="$store.diet.avgCalories + ' kcal'"></span>
                  </div>
                </div>
              </div>
            </aside>

            <!-- ═ MAIN CONTENT ═══════════════════════════════════ -->
            <main style="flex:1;overflow:auto;padding:20px">

              <!-- Page header -->
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:12px">
                <div>
                  <h1 style="font-size:1.25rem;font-weight:700;margin-bottom:2px">Food Database</h1>
                  <p style="color:var(--text3);font-size:0.85rem">Manage your food items with nutrition info and pricing</p>
                </div>
                <button class="btn btn-primary" @click="$store.diet.openModal('addFood')">
                  <svg style="width:14px;height:14px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
                  Add Food
                </button>
              </div>

              <!-- Search bar -->
              <div style="position:relative;margin-bottom:16px;max-width:400px">
                <svg style="position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text3)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input x-model="$store.diet.foodSearch" placeholder="Search foods…" style="width:100%;padding-left:34px" />
              </div>

              <!-- Table -->
              <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
                <table class="food-table">
                  <thead>
                    <tr>
                      <th>Name</th>
                      <th style="text-align:right">Calories<br><span style="font-size:0.6rem;font-weight:400">/100g</span></th>
                      <th style="text-align:right">Protein<br><span style="font-size:0.6rem;font-weight:400">/100g</span></th>
                      <th style="text-align:right">Fats<br><span style="font-size:0.6rem;font-weight:400">/100g</span></th>
                      <th style="text-align:right">Carbs<br><span style="font-size:0.6rem;font-weight:400">/100g</span></th>
                      <th style="text-align:right">Pkg Wt<br><span style="font-size:0.6rem;font-weight:400">grams</span></th>
                      <th style="text-align:right">Price</th>
                      <th style="text-align:right">₽/100g</th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="food in $store.diet.filteredFoods" :key="food.id">
                      <tr>
                        <td>
                          <span style="font-weight:500" x-text="food.name"></span>
                          <span x-show="food.priceType === 'per_kg'" class="badge" style="margin-left:6px;font-size:0.6rem;padding:2px 6px">/kg</span>
                        </td>
                        <td style="text-align:right;color:var(--text2)" x-text="food.calories || '—'"></td>
                        <td style="text-align:right;color:var(--accent);font-weight:600" x-text="food.protein ? food.protein + 'g' : '—'"></td>
                        <td style="text-align:right;color:var(--text3)" x-text="food.fats ? food.fats + 'g' : '—'"></td>
                        <td style="text-align:right;color:var(--text3)" x-text="food.carbs ? food.carbs + 'g' : '—'"></td>
                        <td style="text-align:right;color:var(--text2)" x-text="food.packageWeight ? food.packageWeight + 'g' : '—'"></td>
                        <td style="text-align:right;color:var(--text2)" x-text="food.price ? food.price.toFixed(2) + ' lv' : '—'"></td>
                        <td style="text-align:right;font-size:0.8rem;color:var(--text3)" x-text="$store.diet.formatPricePer100g(food)"></td>
                        <td style="text-align:right">
                          <div style="display:flex;gap:4px;justify-content:flex-end">
                            <button class="btn-icon" style="width:28px;height:28px" title="Edit" @click="$store.diet.openModal('editFood', food.id)">
                              <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
                                <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
                              </svg>
                            </button>
                            <button class="btn-icon" style="width:28px;height:28px;color:var(--danger)" title="Delete" @click="$store.diet.openModal('deleteFood', food.id)">
                              <svg style="width:13px;height:13px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="3 6 5 6 21 6"/>
                                <path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                              </svg>
                            </button>
                          </div>
                        </td>
                      </tr>
                    </template>
                    <!-- Empty state -->
                    <tr x-show="!$store.diet.filteredFoods.length">
                      <td colspan="9">
                        <div class="empty-state">
                          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <path d="M12 2a9 9 0 0 1 9 9c0 4.17-2.84 7.67-6.7 8.67L12 22l-2.3-2.33C5.84 18.67 3 15.17 3 11A9 9 0 0 1 12 2z"/>
                          </svg>
                          <p style="font-size:1rem;font-weight:600;margin-bottom:6px" x-text="$store.diet.foodSearch ? 'No foods match your search' : 'No foods yet'"></p>
                          <p style="font-size:0.85rem" x-text="$store.diet.foodSearch ? 'Try a different search term' : 'Click &quot;Add Food&quot; to get started'"></p>
                        </div>
                      </td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </main>
          </div><!-- /body -->

          <!-- ═ MODALS ══════════════════════════════════════════════ -->

          <!-- Add / Edit Food Modal -->
          <template x-if="$store.diet.modal === 'addFood' || $store.diet.modal === 'editFood'">
            <div style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px" @click.self="$store.diet.closeModal()">
              <div class="modal-box" @click.stop>
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
                  <h2 style="font-size:1rem;font-weight:700" x-text="$store.diet.modal === 'addFood' ? 'Add Food' : 'Edit Food'"></h2>
                  <button class="btn-icon" @click="$store.diet.closeModal()">
                    <svg style="width:16px;height:16px" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
                  </button>
                </div>

                <div class="form-group">
                  <label class="form-label">Food Name *</label>
                  <input x-model="$store.diet.foodForm.name" placeholder="e.g. Chicken Breast 650g" />
                </div>

                <div class="form-row form-row-2">
                  <div>
                    <label class="form-label">Calories per 100g *</label>
                    <input type="number" x-model.number="$store.diet.foodForm.calories" placeholder="0" min="0" />
                  </div>
                  <div>
                    <label class="form-label">Protein per 100g *</label>
                    <input type="number" x-model.number="$store.diet.foodForm.protein" placeholder="0" min="0" step="0.1" />
                  </div>
                </div>

                <div class="form-row form-row-2">
                  <div>
                    <label class="form-label">Fats per 100g</label>
                    <input type="number" x-model.number="$store.diet.foodForm.fats" placeholder="0" min="0" step="0.1" />
                  </div>
                  <div>
                    <label class="form-label">Carbs per 100g</label>
                    <input type="number" x-model.number="$store.diet.foodForm.carbs" placeholder="0" min="0" step="0.1" />
                  </div>
                </div>

                <div class="form-row form-row-2">
                  <div>
                    <label class="form-label">Package Weight (g)</label>
                    <input type="number" x-model.number="$store.diet.foodForm.packageWeight" placeholder="e.g. 500" min="0" />
                  </div>
                  <div>
                    <label class="form-label">Price</label>
                    <input type="number" x-model.number="$store.diet.foodForm.price" placeholder="0.00" min="0" step="0.01" />
                  </div>
                </div>

                <div class="form-group">
                  <label class="form-label">Price Type</label>
                  <select x-model="$store.diet.foodForm.priceType">
                    <option value="per_package">Per Package</option>
                    <option value="per_kg">Per Kilogram</option>
                  </select>
                </div>

                <!-- Live preview -->
                <div x-show="$store.diet.foodForm.calories || $store.diet.foodForm.protein"
                  style="background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 14px;margin-bottom:16px;font-size:0.8rem">
                  <div style="color:var(--text3);margin-bottom:4px;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px">Preview</div>
                  <div style="display:flex;gap:16px;flex-wrap:wrap">
                    <span><span style="color:var(--text3)">Cal: </span><span style="color:var(--text);font-weight:600" x-text="$store.diet.foodForm.calories || 0"></span></span>
                    <span><span style="color:var(--text3)">Prot: </span><span style="color:var(--accent);font-weight:600" x-text="($store.diet.foodForm.protein || 0) + 'g'"></span></span>
                    <span x-show="$store.diet.foodForm.fats"><span style="color:var(--text3)">Fat: </span><span x-text="($store.diet.foodForm.fats || 0) + 'g'"></span></span>
                    <span x-show="$store.diet.foodForm.carbs"><span style="color:var(--text3)">Carbs: </span><span x-text="($store.diet.foodForm.carbs || 0) + 'g'"></span></span>
                    <span x-show="$store.diet.previewPricePer100g"><span style="color:var(--text3)">₽/100g: </span><span x-text="$store.diet.previewPricePer100g"></span></span>
                  </div>
                </div>

                <div x-show="$store.diet.formError" class="error-box" x-text="$store.diet.formError"></div>

                <div style="display:flex;gap:10px;justify-content:flex-end">
                  <button class="btn btn-secondary" @click="$store.diet.closeModal()">Cancel</button>
                  <button class="btn btn-primary" @click="$store.diet.submitFoodForm()" :disabled="$store.diet.saving">
                    <span x-show="!$store.diet.saving" x-text="$store.diet.modal === 'addFood' ? 'Add Food' : 'Save Changes'"></span>
                    <span x-show="$store.diet.saving">Saving…</span>
                  </button>
                </div>
              </div>
            </div>
          </template>

          <!-- Delete Food Modal -->
          <template x-if="$store.diet.modal === 'deleteFood'">
            <div style="position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px" @click.self="$store.diet.closeModal()">
              <div class="modal-box" style="max-width:380px" @click.stop>
                <h2 style="font-size:1rem;font-weight:700;margin-bottom:8px">Delete Food</h2>
                <p style="color:var(--text3);font-size:0.875rem;margin-bottom:20px">
                  Delete <strong x-text="$store.diet.selectedFood?.name"></strong>? This cannot be undone.
                </p>
                <div style="display:flex;gap:10px;justify-content:flex-end">
                  <button class="btn btn-secondary" @click="$store.diet.closeModal()">Cancel</button>
                  <button class="btn btn-danger" @click="$store.diet.confirmDeleteFood()" :disabled="$store.diet.saving">
                    <span x-show="!$store.diet.saving">Delete</span>
                    <span x-show="$store.diet.saving">Deleting…</span>
                  </button>
                </div>
              </div>
            </div>
          </template>

          <!-- ═ TOASTS ══════════════════════════════════════════════ -->
          <div style="position:fixed;bottom:24px;right:24px;display:flex;flex-direction:column;gap:8px;z-index:200">
            <template x-for="toast in $store.diet.toasts" :key="toast.id">
              <div class="toast" :class="toast.type === 'error' ? 'toast-error' : 'toast-success'">
                <svg style="width:16px;height:16px;flex-shrink:0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <template x-if="toast.type !== 'error'"><path d="M20 6L9 17l-5-5"/></template>
                  <template x-if="toast.type === 'error'"><path d="M18 6L6 18M6 6l12 12"/></template>
                </svg>
                <span x-text="toast.msg"></span>
              </div>
            </template>
          </div>

        </div><!-- /app shell -->
      </template>
    </div><!-- /root -->

    <script type="module">
      import Alpine from "https://cdn.jsdelivr.net/npm/alpinejs@3/dist/module.esm.js";
      import { auth } from "./js/firebase.js";
      import * as DB from "./js/db.js";
      import { pricePer100g, round } from "./js/utils.js";
      import {
        signInWithEmailAndPassword,
        signOut,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

      Alpine.store("diet", {
        // ── Auth ──────────────────────────────────────────────
        authState: "loading",  // loading | unauthenticated | authenticated
        user: null,
        authEmail: "",
        authPassword: "",
        authLoading: false,
        authError: "",

        // ── Data ──────────────────────────────────────────────
        foods: [],
        mealPlans: [],
        foodSearch: "",

        // ── UI ────────────────────────────────────────────────
        sidebarOpen: window.innerWidth >= 769,
        modal: null,
        saving: false,
        formError: "",
        toasts: [],

        // ── Food form ─────────────────────────────────────────
        foodForm: {
          name: "", calories: 0, protein: 0, fats: 0, carbs: 0,
          packageWeight: 0, price: 0, priceType: "per_package"
        },
        editingFoodId: null,

        // ── Init ──────────────────────────────────────────────
        init() {
          onAuthStateChanged(auth, async (user) => {
            if (user) {
              this.user = user;
              this.authState = "authenticated";
              await this.loadData();
            } else {
              this.user = null;
              this.authState = "unauthenticated";
            }
          });
        },

        async loadData() {
          try {
            const [foods, plans] = await Promise.all([
              DB.getFoods(this.user.uid),
              DB.getMealPlans(this.user.uid),
            ]);
            this.foods = foods;
            this.mealPlans = plans;
          } catch (e) {
            this.toast("Failed to load data: " + e.message, "error");
          }
        },

        // ── Auth ──────────────────────────────────────────────
        async login() {
          this.authError = "";
          if (!this.authEmail || !this.authPassword) {
            this.authError = "Please fill in all fields.";
            return;
          }
          this.authLoading = true;
          try {
            await signInWithEmailAndPassword(auth, this.authEmail, this.authPassword);
          } catch (e) {
            const map = {
              "auth/user-not-found": "No account with that email.",
              "auth/wrong-password": "Incorrect password.",
              "auth/invalid-credential": "Invalid email or password.",
              "auth/too-many-requests": "Too many attempts. Try again later.",
            };
            this.authError = map[e.code] ?? "Sign-in failed. Please try again.";
          } finally {
            this.authLoading = false;
          }
        },

        async logout() {
          await signOut(auth);
          this.foods = [];
          this.mealPlans = [];
        },

        // ── Computed ──────────────────────────────────────────
        get filteredFoods() {
          const q = this.foodSearch.toLowerCase().trim();
          if (!q) return this.foods;
          return this.foods.filter(f => f.name.toLowerCase().includes(q));
        },

        get avgProtein() {
          if (!this.foods.length) return 0;
          return round(this.foods.reduce((s, f) => s + (f.protein || 0), 0) / this.foods.length, 1);
        },

        get avgCalories() {
          if (!this.foods.length) return 0;
          return round(this.foods.reduce((s, f) => s + (f.calories || 0), 0) / this.foods.length, 0);
        },

        get selectedFood() {
          return this.foods.find(f => f.id === this.editingFoodId) || null;
        },

        get previewPricePer100g() {
          const pp = pricePer100g(this.foodForm);
          return pp != null ? round(pp, 3) + " lv" : "";
        },

        // ── Format helpers ────────────────────────────────────
        formatPricePer100g(food) {
          const pp = pricePer100g(food);
          return pp != null ? round(pp, 3) + " lv" : "—";
        },

        // ── Modal management ──────────────────────────────────
        openModal(name, foodId = null) {
          this.modal = name;
          this.formError = "";
          this.editingFoodId = foodId;
          if (name === "addFood") {
            this.foodForm = { name: "", calories: 0, protein: 0, fats: 0, carbs: 0, packageWeight: 0, price: 0, priceType: "per_package" };
          } else if (name === "editFood" && foodId) {
            const food = this.foods.find(f => f.id === foodId);
            if (food) this.foodForm = { ...food };
          }
        },

        closeModal() {
          this.modal = null;
          this.formError = "";
          this.editingFoodId = null;
        },

        // ── Food CRUD ─────────────────────────────────────────
        async submitFoodForm() {
          this.formError = "";
          if (!this.foodForm.name.trim()) {
            this.formError = "Food name is required.";
            return;
          }
          if (!this.foodForm.calories && !this.foodForm.protein) {
            this.formError = "Please enter at least calories or protein.";
            return;
          }
          this.saving = true;
          try {
            if (this.modal === "addFood") {
              const newFood = await DB.addFood(this.user.uid, this.foodForm);
              this.foods = [...this.foods, newFood].sort((a, b) => a.name.localeCompare(b.name));
              this.toast("Food added!");
            } else {
              await DB.updateFood(this.user.uid, this.editingFoodId, this.foodForm);
              this.foods = this.foods.map(f =>
                f.id === this.editingFoodId ? { ...f, ...this.foodForm } : f
              );
              this.toast("Food updated!");
            }
            this.closeModal();
          } catch (e) {
            this.formError = e.message;
          } finally {
            this.saving = false;
          }
        },

        async confirmDeleteFood() {
          this.saving = true;
          try {
            await DB.deleteFood(this.user.uid, this.editingFoodId);
            this.foods = this.foods.filter(f => f.id !== this.editingFoodId);
            this.toast("Food deleted!");
            this.closeModal();
          } catch (e) {
            this.formError = e.message;
          } finally {
            this.saving = false;
          }
        },

        // ── Toasts ────────────────────────────────────────────
        toast(msg, type = "success") {
          const id = Math.random().toString(36).slice(2);
          this.toasts = [...this.toasts, { id, msg, type }];
          setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3000);
        },
      });

      Alpine.start();
    </script>
  </body>
</html>
