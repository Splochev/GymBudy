<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GymBud – Sign In</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./css/app.css" />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 24px;
      }
      .auth-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 48px 52px;
        width: 100%;
        max-width: 560px;
        box-shadow: var(--shadow);
        animation: fadeIn 0.3s;
      }
      .auth-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        justify-content: center;
        margin-bottom: 28px;
      }
      .auth-logo span {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent);
        letter-spacing: -0.5px;
      }
      .auth-logo svg {
        width: 32px;
        height: 32px;
        color: var(--accent);
      }
      .form-label {
        display: block;
        font-size: 0.8rem;
        color: var(--text2);
        margin-bottom: 4px;
        font-weight: 500;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group input {
        width: 100%;
      }

      .error-box {
        background: rgba(239, 68, 68, 0.1);
        border: 1px solid rgba(239, 68, 68, 0.3);
        border-radius: var(--radius-sm);
        padding: 10px 14px;
        color: #fca5a5;
        font-size: 0.8rem;
        margin-bottom: 16px;
      }
    </style>
  </head>
  <body>
    <div x-data="authPage()" style="width:100%;max-width:560px">
      <div class="auth-card">
        <!-- Logo -->
        <div class="auth-logo">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="2" y="9" width="3" height="6" rx="1" />
            <rect x="19" y="9" width="3" height="6" rx="1" />
            <rect x="5" y="7" width="3" height="10" rx="1" />
            <rect x="16" y="7" width="3" height="10" rx="1" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
          <span>GymBud</span>
        </div>

        <!-- Language toggle -->
        <div style="display:flex;justify-content:flex-end;margin-bottom:12px">
          <button
            class="btn btn-ghost btn-sm"
            @click="setLang(lang === 'en' ? 'bg' : 'en')"
            :title="lang === 'en' ? 'Switch to Bulgarian' : 'Смени на английски'"
            style="font-size: 0.75rem; font-weight: 700; padding: 4px 10px; letter-spacing: 0.5px"
            x-text="lang === 'en' ? 'EN' : 'BG'"
          ></button>
        </div>

        <!-- Error -->
        <div x-show="error" class="error-box" x-text="error"></div>

        <!-- Login Form -->
        <div>
          <h2 style="font-size: 1.1rem; font-weight: 700; margin-bottom: 4px" x-text="t('welcome_back')"></h2>
          <p
            style="color: var(--text3); font-size: 0.85rem; margin-bottom: 20px"
            x-text="t('sign_in_desc')"
          ></p>
          <div class="form-group">
            <label class="form-label" x-text="t('label_email')"></label>
            <input
              type="email"
              x-model="email"
              @keyup.enter="login()"
              :placeholder="t('placeholder_email')"
            />
          </div>
          <div class="form-group">
            <label class="form-label" x-text="t('label_password')"></label>
            <input
              type="password"
              x-model="password"
              @keyup.enter="login()"
              :placeholder="t('placeholder_password')"
            />
          </div>
          <button
            class="btn btn-primary"
            style="width: 100%; justify-content: center; padding: 10px 16px"
            @click="login()"
            :disabled="loading"
          >
            <span x-show="!loading" x-text="t('btn_sign_in')"></span>
            <span x-show="loading" x-text="t('btn_signing_in')"></span>
          </button>
        </div>
      </div>
    </div>

    <script type="module">
      import Alpine from "https://cdn.jsdelivr.net/npm/alpinejs@3/dist/module.esm.js";
      import { auth } from "./js/firebase.js";
      import { translations } from "./js/i18n.js";
      import {
        signInWithEmailAndPassword,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

      // If already logged in, go straight to workout page
      onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = "./workout.html";
      });

      Alpine.data("authPage", () => ({
        email: "",
        password: "",
        loading: false,
        error: "",
        lang: localStorage.getItem("gymbudy-lang") || "en",

        t(key) {
          const tr = translations[this.lang] ?? translations.en;
          const entry = tr[key] ?? translations.en[key];
          return entry ?? key;
        },

        setLang(langCode) {
          this.lang = langCode;
          localStorage.setItem("gymbudy-lang", langCode);
        },

        async login() {
          this.error = "";
          if (!this.email || !this.password) {
            this.error = this.t("error_fill_fields");
            return;
          }
          this.loading = true;
          try {
            await signInWithEmailAndPassword(auth, this.email, this.password);
            window.location.href = "./workout.html";
          } catch (e) {
            this.error = this._friendly(e.code);
          } finally {
            this.loading = false;
          }
        },

        _friendly(code) {
          const map = {
            "auth/user-not-found": this.t("error_user_not_found"),
            "auth/wrong-password": this.t("error_wrong_password"),
            "auth/invalid-credential": this.t("error_invalid_credential"),
            "auth/email-already-in-use": this.t("error_email_in_use"),
            "auth/too-many-requests": this.t("error_too_many_requests"),
            "auth/network-request-failed": this.t("error_network"),
          };
          return map[code] ?? this.t("error_generic");
        },
      }));

      Alpine.start();
    </script>
  </body>
</html>
