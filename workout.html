<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GymBudy – Workout Manager</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <!-- ════════════════════════════════════════════════════════════
     APP SHELL  (x-data is empty; all state lives in $store.gym)
     ════════════════════════════════════════════════════════════ -->
    <div
      x-data
      style="display: flex; flex-direction: column; height: 100vh"
      x-init="$store.gym.init()"
    >
      <!-- ── Loading screen ──────────────────────────────────────── -->
      <div
        x-show="$store.gym.loading"
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: var(--bg);
        "
      >
        <div style="text-align: center; color: var(--text3)">
          <svg
            style="
              width: 40px;
              height: 40px;
              color: var(--accent);
              animation: pulse 1.5s infinite;
              margin-bottom: 12px;
            "
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="2" y="9" width="3" height="6" rx="1" />
            <rect x="19" y="9" width="3" height="6" rx="1" />
            <rect x="5" y="7" width="3" height="10" rx="1" />
            <rect x="16" y="7" width="3" height="10" rx="1" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
          <p style="font-size: 0.9rem" x-text="$store.gym.t('loading')"></p>
        </div>
      </div>

      <!-- ── App (only visible when loaded) ─────────────────────── -->
      <template x-if="!$store.gym.loading">
        <div style="display: flex; flex-direction: column; height: 100vh">
          <!-- ════ TOP BAR ════════════════════════════════════════ -->
          <header
            id="topbar"
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              padding: 10px 20px;
              background: var(--surface);
              border-bottom: 1px solid var(--border);
              flex-shrink: 0;
            "
          >
            <!-- Sidebar toggle -->
            <button
              class="btn-icon"
              @click="$store.gym.sidebarOpen = !$store.gym.sidebarOpen"
              :title="$store.gym.t('toggle_sidebar')"
            >
              <svg
                style="width: 18px; height: 18px"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 12h18M3 6h18M3 18h18" />
              </svg>
            </button>

            <!-- Logo -->
            <div
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 1.15rem;
                font-weight: 700;
                color: var(--accent);
                letter-spacing: -0.5px;
                flex-shrink: 0;
              "
            >
              <svg
                style="width: 26px; height: 26px"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="2" y="9" width="3" height="6" rx="1" />
                <rect x="19" y="9" width="3" height="6" rx="1" />
                <rect x="5" y="7" width="3" height="10" rx="1" />
                <rect x="16" y="7" width="3" height="10" rx="1" />
                <line x1="8" y1="12" x2="16" y2="12" />
              </svg>
              GymBudy
            </div>

            <!-- Navigation tabs -->
            <div style="display: flex; gap: 16px; margin-left: 8px">
              <button
                @click="$store.gym.switchView('workout')"
                :style="$store.gym.view==='workout' ? 'color:var(--accent);background:var(--accent-bg);padding:8px 16px;border-radius:4px;display: flex;align-items: center;gap: 6px;' : 'color:var(--text3);display: flex;align-items: center;gap: 6px;'"
                style="
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  padding: 8px 16px;
                  border-radius: 4px;
                  font-size: 0.8rem;
                  font-weight: 500;
                  transition: var(--trans);
                "
              >
                <svg
                  style="width: 14px; height: 14px; flex-shrink: 0"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="2" y="9" width="3" height="6" rx="1" />
                  <rect x="19" y="9" width="3" height="6" rx="1" />
                  <rect x="5" y="7" width="3" height="10" rx="1" />
                  <rect x="16" y="7" width="3" height="10" rx="1" />
                  <line x1="8" y1="12" x2="16" y2="12" />
                </svg>
                <span x-text="$store.gym.t('workouts')"></span>
              </button>
            </div>

            <!-- Spacer -->
            <div style="flex: 1"></div>

            <!-- Language toggle -->
            <button
              class="btn btn-ghost btn-sm"
              @click="$store.gym.setLang($store.gym.lang === 'en' ? 'bg' : 'en')"
              :title="$store.gym.lang === 'en' ? 'Switch to Bulgarian' : 'Смени на английски'"
              style="
                font-size: 0.75rem;
                font-weight: 700;
                padding: 4px 10px;
                letter-spacing: 0.5px;
              "
              x-text="$store.gym.lang === 'en' ? 'EN' : 'BG'"
            ></button>

            <!-- User info + logout -->
            <div style="display: flex; align-items: center; gap: 8px">
              <span
                style="font-size: 0.8rem; color: var(--text3)"
                x-text="$store.gym.user?.displayName || $store.gym.user?.email?.split('@')[0]"
              ></span>
              <button
                class="btn-icon"
                @click="$store.gym.logout()"
                :title="$store.gym.t('sign_out')"
              >
                <svg
                  style="width: 16px; height: 16px"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </header>

          <!-- ════ BODY ════════════════════════════════════════════ -->
          <div
            style="display: flex; flex: 1; overflow: hidden; position: relative"
          >
            <!-- Mobile overlay -->
            <!-- ════ SIDEBAR ══════════════════════════════════════ -->
            <aside
              id="sidebar"
              :class="{ open: $store.gym.sidebarOpen }"
              style="
                background: var(--surface);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
              "
            >
              <!-- ── Mobile-only sidebar header ──────────────────── -->
              <div
                class="sidebar-mobile-header"
                style="display: none; flex-direction: column; flex-shrink: 0"
              >
                <!-- Brand row -->
                <div
                  style="
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    padding: 14px 16px;
                    border-bottom: 1px solid var(--border);
                  "
                >
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 8px;
                      font-size: 1.1rem;
                      font-weight: 700;
                      color: var(--accent);
                      letter-spacing: -0.5px;
                    "
                  >
                    <svg
                      style="width: 24px; height: 24px"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <rect x="2" y="9" width="3" height="6" rx="1" />
                      <rect x="19" y="9" width="3" height="6" rx="1" />
                      <rect x="5" y="7" width="3" height="10" rx="1" />
                      <rect x="16" y="7" width="3" height="10" rx="1" />
                      <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                    GymBudy
                  </div>
                  <button
                    class="btn-icon"
                    @click="$store.gym.sidebarOpen = false"
                    title="Close menu"
                  >
                    <svg
                      style="width: 18px; height: 18px"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M18 6L6 18M6 6l12 12" />
                    </svg>
                  </button>
                </div>

                <!-- Nav tabs -->
                <div
                  style="
                    display: flex;
                    flex-direction: column;
                    padding: 8px;
                    border-bottom: 1px solid var(--border);
                    gap: 2px;
                  "
                >
                  <button
                    @click="$store.gym.switchView('workout'); $store.gym.sidebarOpen = false"
                    :style="$store.gym.view === 'workout' ? 'background:var(--accent-bg);color:var(--accent);display: flex;align-items: center;gap: 10px;padding: 14px 12px;border-radius: var(--radius);' : 'color:var(--text3);display: flex;align-items: center;gap: 10px;padding: 14px 12px;border-radius: var(--radius);'"
                    style="
                      width: 100%;
                      display: flex;
                      align-items: center;
                      gap: 10px;
                      padding: 14px 12px;
                      border-radius: var(--radius);
                      font-size: 0.875rem;
                      font-weight: 600;
                      transition: var(--trans);
                      text-align: left;
                    "
                  >
                    <svg
                      style="width: 16px; height: 16px; flex-shrink: 0"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <rect x="2" y="9" width="3" height="6" rx="1" />
                      <rect x="19" y="9" width="3" height="6" rx="1" />
                      <rect x="5" y="7" width="3" height="10" rx="1" />
                      <rect x="16" y="7" width="3" height="10" rx="1" />
                      <line x1="8" y1="12" x2="16" y2="12" />
                    </svg>
                    <span x-text="$store.gym.t('workouts')"></span>
                  </button>
                </div>
              </div>
              <!-- /mobile sidebar header -->

              <!-- Programs section -->
              <div
                style="
                  padding: 12px 16px;
                  border-bottom: 1px solid var(--border);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-bottom: 8px;
                  "
                >
                  <span
                    style="
                      font-size: 0.7rem;
                      text-transform: uppercase;
                      letter-spacing: 1px;
                      color: var(--text3);
                      font-weight: 600;
                    "
                    x-text="$store.gym.t('programs')"
                  ></span>
                  <button
                    class="btn-icon"
                    style="width: 24px; height: 24px"
                    :title="$store.gym.t('new_program')"
                    @click="$store.gym.openModal('addProgram')"
                  >
                    <svg
                      style="width: 14px; height: 14px"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M12 5v14M5 12h14" />
                    </svg>
                  </button>
                </div>
                <div style="display: flex; flex-direction: column; gap: 2px">
                  <template
                    x-for="program in $store.gym.programs"
                    :key="program.id"
                  >
                    <div
                      class="sidebar-item"
                      :class="{ active: $store.gym.selectedProgramId === program.id }"
                      @click="$store.gym.selectProgram(program.id)"
                    >
                      <span
                        x-text="program.name"
                        style="
                          flex: 1;
                          overflow: hidden;
                          text-overflow: ellipsis;
                          white-space: nowrap;
                        "
                      ></span>
                      <div class="item-actions">
                        <button
                          class="btn-icon"
                          style="width: 22px; height: 22px"
                          title="Edit"
                          @click.stop="$store.gym.openModal('editProgram', program.id)"
                        >
                          <svg
                            style="width: 12px; height: 12px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <path
                              d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"
                            />
                            <path
                              d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"
                            />
                          </svg>
                        </button>
                        <button
                          class="btn-icon"
                          style="
                            width: 22px;
                            height: 22px;
                            color: var(--danger);
                          "
                          title="Delete"
                          @click.stop="$store.gym.openModal('deleteProgram', program.id)"
                        >
                          <svg
                            style="width: 12px; height: 12px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <polyline points="3 6 5 6 21 6" />
                            <path
                              d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"
                            />
                          </svg>
                        </button>
                      </div>
                    </div>
                  </template>
                  <div
                    x-show="!$store.gym.programs.length"
                    style="
                      font-size: 0.8rem;
                      color: var(--text3);
                      padding: 8px 12px;
                    "
                    x-text="$store.gym.t('no_programs')"
                  ></div>
                </div>
              </div>

              <!-- Sessions section -->
              <div
                style="
                  flex: 1;
                  display: flex;
                  flex-direction: column;
                  overflow: hidden;
                  padding-top: 4px;
                "
              >
                <div
                  style="
                    padding: 8px 16px 6px;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                  "
                >
                  <span
                    style="
                      font-size: 0.7rem;
                      text-transform: uppercase;
                      letter-spacing: 1px;
                      color: var(--text3);
                      font-weight: 600;
                    "
                    x-text="$store.gym.t('workout_days')"
                  ></span>
                  <button
                    class="btn-icon"
                    style="width: 24px; height: 24px"
                    :title="$store.gym.t('new_day')"
                    :disabled="!$store.gym.selectedProgramId"
                    @click="$store.gym.openModal('addSession')"
                  >
                    <svg
                      style="width: 14px; height: 14px"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M12 5v14M5 12h14" />
                    </svg>
                  </button>
                </div>
                <div style="flex: 1; overflow-y: auto; padding: 0 8px 8px">
                  <template
                    x-for="session in $store.gym.sessions"
                    :key="session.id"
                  >
                    <div
                      class="sidebar-item"
                      :class="{ active: $store.gym.selectedSessionId === session.id }"
                      @click="$store.gym.selectSession(session.id); if(window.innerWidth<=600) $store.gym.sidebarOpen=false"
                    >
                      <span
                        x-text="session.name"
                        style="
                          flex: 1;
                          overflow: hidden;
                          text-overflow: ellipsis;
                          white-space: nowrap;
                        "
                      ></span>
                      <div class="item-actions">
                        <button
                          class="btn-icon"
                          style="width: 22px; height: 22px"
                          title="Edit"
                          @click.stop="$store.gym.openModal('editSession', session.id)"
                        >
                          <svg
                            style="width: 12px; height: 12px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <path
                              d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"
                            />
                            <path
                              d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"
                            />
                          </svg>
                        </button>
                        <button
                          class="btn-icon"
                          style="
                            width: 22px;
                            height: 22px;
                            color: var(--danger);
                          "
                          title="Delete"
                          @click.stop="$store.gym.openModal('deleteSession', session.id)"
                        >
                          <svg
                            style="width: 12px; height: 12px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <polyline points="3 6 5 6 21 6" />
                            <path
                              d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"
                            />
                          </svg>
                        </button>
                      </div>
                    </div>
                  </template>
                  <div
                    x-show="$store.gym.selectedProgramId && !$store.gym.sessions.length"
                    style="
                      font-size: 0.8rem;
                      color: var(--text3);
                      padding: 8px 12px;
                    "
                    x-text="$store.gym.t('no_days')"
                  ></div>
                  <div
                    x-show="!$store.gym.selectedProgramId"
                    style="
                      font-size: 0.8rem;
                      color: var(--text3);
                      padding: 8px 12px;
                    "
                    x-text="$store.gym.t('select_program_first')"
                  ></div>
                </div>
              </div>

              <!-- Mobile-only user footer (pinned to bottom of drawer) -->
              <div
                class="sidebar-mobile-header"
                style="
                  display: none;
                  flex-direction: column;
                  flex-shrink: 0;
                  border-top: 1px solid var(--border);
                  padding: 12px 16px;
                  gap: 8px;
                "
              >
                <span
                  style="font-size: 0.78rem; color: var(--text3)"
                  x-text="$store.gym.user?.displayName || $store.gym.user?.email?.split('@')[0]"
                ></span>
                <div style="display: flex; align-items: center; gap: 8px">
                  <button
                    class="btn btn-ghost btn-sm"
                    @click="$store.gym.setLang($store.gym.lang === 'en' ? 'bg' : 'en')"
                    :title="$store.gym.lang === 'en' ? 'Switch to Bulgarian' : 'Смени на английски'"
                    style="
                      font-size: 0.7rem;
                      font-weight: 700;
                      padding: 3px 8px;
                      letter-spacing: 0.5px;
                    "
                    x-text="$store.gym.lang === 'en' ? 'EN' : 'BG'"
                  ></button>
                  <button
                    class="btn btn-ghost btn-sm"
                    @click="$store.gym.logout()"
                    :title="$store.gym.t('sign_out')"
                    style="
                      display: flex;
                      align-items: center;
                      gap: 5px;
                      color: var(--text3);
                    "
                  >
                    <svg
                      style="width: 14px; height: 14px"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                      <polyline points="16 17 21 12 16 7" />
                      <line x1="21" y1="12" x2="9" y2="12" />
                    </svg>
                    <span x-text="$store.gym.t('sign_out')"></span>
                  </button>
                </div>
              </div>
              <!-- /mobile user footer -->
            </aside>

            <!-- Mobile overlay — closes sidebar when tapped -->
            <div
              id="sidebar-overlay"
              @click="$store.gym.sidebarOpen = false"
            ></div>

            <!-- ════ MAIN CONTENT ══════════════════════════════════ -->
            <main
              style="
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
              "
            >
              <!-- ──── WORKOUT / CONFIG VIEW ────────────────────── -->
              <template x-if="$store.gym.view === 'workout'">
                <div
                  style="
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    overflow: hidden;
                  "
                >
                  <!-- Toolbar -->
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 10px;
                      padding: 10px 20px;
                      border-bottom: 1px solid var(--border);
                      background: var(--surface);
                      flex-shrink: 0;
                      flex-wrap: wrap;
                    "
                  >
                    <!-- Mode tabs -->
                    <div style="display: flex; gap: 16px; flex-shrink: 0">
                      <button
                        @click="$store.gym.mode='workout'"
                        :style="$store.gym.mode==='workout' ? 'color:var(--accent);background:var(--accent-bg);padding:8px 16px;border-radius:4px;display: flex;align-items: center;gap: 6px;' : 'color:var(--text3);display: flex;align-items: center;gap: 6px;'"
                        style="
                          display: flex;
                          align-items: center;
                          gap: 6px;
                          padding: 8px 16px;
                          border-radius: 4px;
                          font-size: 0.8rem;
                          font-weight: 500;
                          transition: var(--trans);
                        "
                      >
                        <svg
                          style="width: 14px; height: 14px; flex-shrink: 0"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                        >
                          <rect x="2" y="9" width="3" height="6" rx="1" />
                          <rect x="19" y="9" width="3" height="6" rx="1" />
                          <rect x="5" y="7" width="3" height="10" rx="1" />
                          <rect x="16" y="7" width="3" height="10" rx="1" />
                          <line x1="8" y1="12" x2="16" y2="12" />
                        </svg>
                        <span x-text="$store.gym.t('mode_workout')"></span>
                      </button>
                      <button
                        @click="$store.gym.mode='config'"
                        :style="$store.gym.mode==='config' ? 'color:var(--accent);background:var(--accent-bg);padding:8px 16px;border-radius:4px;display: flex;align-items: center;gap: 6px;' : 'color:var(--text3);display: flex;align-items: center;gap: 6px;'"
                        style="
                          display: flex;
                          align-items: center;
                          gap: 6px;
                          padding: 8px 16px;
                          border-radius: 4px;
                          font-size: 0.8rem;
                          font-weight: 500;
                          transition: var(--trans);
                        "
                      >
                        <svg
                          style="width: 14px; height: 14px; flex-shrink: 0"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                        >
                          <circle cx="12" cy="12" r="3" />
                          <path

          position: fixed;
          top: 0;
          left: 0;
          height: 100vh;
          width: 0;
          z-index: 200;
          box-shadow: none;
          transition:
            width 0.25s ease,
            box-shadow 0.25s ease;
        }
        #sidebar.open {
          width: min(300px, 85vw);
          box-shadow: 4px 0 32px rgba(0, 0, 0, 0.6);
        }
        #sidebar-overlay {
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.5);
          z-index: 199;
        }
        #sidebar.open ~ #sidebar-overlay,
        body:has(#sidebar.open) #sidebar-overlay {
          display: block;
        }
        .sidebar-mobile-header {
          display: flex !important;
        }
      }
      @media (min-width: 601px) {
        .sidebar-mobile-header {
          display: none !important;
        }
      }
    </style>
    <script type="module">
      import Alpine from "https://cdn.jsdelivr.net/npm/alpinejs@3/dist/module.esm.js";
      import { registerStore } from "./js/store.js";

      registerStore(Alpine);

      window.Alpine = Alpine;
      Alpine.start();
    </script>
  </body>
</html>
