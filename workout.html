<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GymBud – Workout Manager</title>
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <link rel="stylesheet" href="./css/app.css" />
  </head>
  <body>
    <!-- ════════════════════════════════════════════════════════════
     APP SHELL  (x-data is empty; all state lives in $store.gym)
     ════════════════════════════════════════════════════════════ -->
    <div
      x-data
      style="display: flex; flex-direction: column; height: 100vh"
      x-init="$store.gym.init()"
    >
      <!-- ── Loading screen ──────────────────────────────────────── -->
      <div
        x-show="$store.gym.loading"
        style="
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          background: var(--bg);
        "
      >
        <div style="text-align: center; color: var(--text3)">
          <svg
            style="
              width: 40px;
              height: 40px;
              color: var(--accent);
              animation: pulse 1.5s infinite;
              margin-bottom: 12px;
            "
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="2" y="9" width="3" height="6" rx="1" />
            <rect x="19" y="9" width="3" height="6" rx="1" />
            <rect x="5" y="7" width="3" height="10" rx="1" />
            <rect x="16" y="7" width="3" height="10" rx="1" />
            <line x1="8" y1="12" x2="16" y2="12" />
          </svg>
          <p style="font-size: 0.9rem">Loading GymBud…</p>
        </div>
      </div>

      <!-- ── App (only visible when loaded) ─────────────────────── -->
      <template x-if="!$store.gym.loading">
        <div style="display: flex; flex-direction: column; height: 100vh">
          <!-- ════ TOP BAR ════════════════════════════════════════ -->
          <header
            id="topbar"
            style="
              display: flex;
              align-items: center;
              gap: 12px;
              padding: 10px 20px;
              background: var(--surface);
              border-bottom: 1px solid var(--border);
              flex-shrink: 0;
            "
          >
            <!-- Sidebar toggle -->
            <button
              class="btn-icon"
              @click="$store.gym.sidebarOpen = !$store.gym.sidebarOpen"
              title="Toggle sidebar"
            >
              <svg
                style="width: 18px; height: 18px"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 12h18M3 6h18M3 18h18" />
              </svg>
            </button>

            <!-- Logo -->
            <div
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 1.15rem;
                font-weight: 700;
                color: var(--accent);
                letter-spacing: -0.5px;
                flex-shrink: 0;
              "
            >
              <svg
                style="width: 26px; height: 26px"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="2" y="9" width="3" height="6" rx="1" />
                <rect x="19" y="9" width="3" height="6" rx="1" />
                <rect x="5" y="7" width="3" height="10" rx="1" />
                <rect x="16" y="7" width="3" height="10" rx="1" />
                <line x1="8" y1="12" x2="16" y2="12" />
              </svg>
              GymBud
            </div>

            <!-- Navigation tabs -->
            <div style="display: flex; gap: 16px; margin-left: 8px">
              <button
                @click="$store.gym.switchView('workout')"
                :style="$store.gym.view==='workout' ? 'color:var(--accent);background:var(--accent-bg);padding:8px 16px;border-radius:4px;display: flex;align-items: center;gap: 6px;' : 'color:var(--text3);display: flex;align-items: center;gap: 6px;'"
                style="
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  padding: 8px 16px;
                  border-radius: 4px;
                  font-size: 0.8rem;
                  font-weight: 500;
                  transition: var(--trans);
                "
              >
                <svg
                  style="width: 14px; height: 14px; flex-shrink: 0"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="2" y="9" width="3" height="6" rx="1" />
                  <rect x="19" y="9" width="3" height="6" rx="1" />
                  <rect x="5" y="7" width="3" height="10" rx="1" />
                  <rect x="16" y="7" width="3" height="10" rx="1" />
                  <line x1="8" y1="12" x2="16" y2="12" />
                </svg>
                Workouts
              </button>
              <button
                @click="$store.gym.switchView('history')"
                :style="$store.gym.view==='history' ? 'color:var(--accent);background:var(--accent-bg);padding:8px 16px;border-radius:4px;display: flex;align-items: center;gap: 6px;' : 'color:var(--text3);display: flex;align-items: center;gap: 6px;'"
                style="
                  display: flex;
                  align-items: center;
                  gap: 6px;
                  padding: 8px 16px;
                  border-radius: 4px;
                  font-size: 0.8rem;
                  font-weight: 500;
                  transition: var(--trans);
                "
              >
                <svg
                  style="width: 14px; height: 14px; flex-shrink: 0"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M3 3v5h5" />
                  <path d="M3.05 13A9 9 0 106 5.3L3 8" />
                  <path d="M12 7v5l4 2" />
                </svg>
                History
              </button>
            </div>

            <!-- Spacer -->
            <div style="flex: 1"></div>

            <!-- User info + logout -->
            <div style="display: flex; align-items: center; gap: 8px">
              <span
                style="font-size: 0.8rem; color: var(--text3)"
                x-text="$store.gym.user?.displayName || $store.gym.user?.email?.split('@')[0]"
              ></span>
              <button
                class="btn-icon"
                @click="$store.gym.logout()"
                title="Sign out"
              >
                <svg
                  style="width: 16px; height: 16px"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
              </button>
            </div>
          </header>

          <!-- ════ BODY ════════════════════════════════════════════ -->
          <div
            style="display: flex; flex: 1; overflow: hidden; position: relative"
          >
            <!-- Mobile overlay -->
            <!-- ════ SIDEBAR ══════════════════════════════════════ -->
            <aside
              id="sidebar"
              :class="{ open: $store.gym.sidebarOpen }"
              style="
                background: var(--surface);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                overflow: hidden;
              "
            >
              <!-- Programs section -->
              <div
                style="
                  padding: 12px 16px;
                  border-bottom: 1px solid var(--border);
                "
              >
                <div
                  style="
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                    margin-bottom: 8px;
                  "
                >
                  <span
                    style="
                      font-size: 0.7rem;
                      text-transform: uppercase;
                      letter-spacing: 1px;
                      color: var(--text3);
                      font-weight: 600;
                    "
                    >Programs</span
                  >
                  <button
                    class="btn-icon"
                    style="width: 24px; height: 24px"
                    title="New program"
                    @click="$store.gym.openModal('addProgram')"
                  >
                    <svg
                      style="width: 14px; height: 14px"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M12 5v14M5 12h14" />
                    </svg>
                  </button>
                </div>
                <div style="display: flex; flex-direction: column; gap: 2px">
                  <template x-for="p in $store.gym.programs" :key="p.id">
                    <div
                      class="sidebar-item"
                      :class="{ active: $store.gym.selectedProgramId === p.id }"
                      @click="$store.gym.selectProgram(p.id)"
                    >
                      <span
                        x-text="p.name"
                        style="
                          flex: 1;
                          overflow: hidden;
                          text-overflow: ellipsis;
                          white-space: nowrap;
                        "
                      ></span>
                      <div class="item-actions">
                        <button
                          class="btn-icon"
                          style="width: 22px; height: 22px"
                          title="Edit"
                          @click.stop="$store.gym.openModal('editProgram', p.id)"
                        >
                          <svg
                            style="width: 12px; height: 12px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <path
                              d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"
                            />
                            <path
                              d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"
                            />
                          </svg>
                        </button>
                        <button
                          class="btn-icon"
                          style="
                            width: 22px;
                            height: 22px;
                            color: var(--danger);
                          "
                          title="Delete"
                          @click.stop="$store.gym.openModal('deleteProgram', p.id)"
                        >
                          <svg
                            style="width: 12px; height: 12px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <polyline points="3 6 5 6 21 6" />
                            <path
                              d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"
                            />
                          </svg>
                        </button>
                      </div>
                    </div>
                  </template>
                  <div
                    x-show="!$store.gym.programs.length"
                    style="
                      font-size: 0.8rem;
                      color: var(--text3);
                      padding: 8px 12px;
                    "
                  >
                    No programs yet. Create one!
                  </div>
                </div>
              </div>

              <!-- Sessions section -->
              <div
                style="
                  flex: 1;
                  display: flex;
                  flex-direction: column;
                  overflow: hidden;
                  padding-top: 4px;
                "
              >
                <div
                  style="
                    padding: 8px 16px 6px;
                    display: flex;
                    align-items: center;
                    justify-content: space-between;
                  "
                >
                  <span
                    style="
                      font-size: 0.7rem;
                      text-transform: uppercase;
                      letter-spacing: 1px;
                      color: var(--text3);
                      font-weight: 600;
                    "
                    >Workout Days</span
                  >
                  <button
                    class="btn-icon"
                    style="width: 24px; height: 24px"
                    title="New day"
                    :disabled="!$store.gym.selectedProgramId"
                    @click="$store.gym.openModal('addSession')"
                  >
                    <svg
                      style="width: 14px; height: 14px"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M12 5v14M5 12h14" />
                    </svg>
                  </button>
                </div>
                <div style="flex: 1; overflow-y: auto; padding: 0 8px 8px">
                  <template x-for="s in $store.gym.sessions" :key="s.id">
                    <div
                      class="sidebar-item"
                      :class="{ active: $store.gym.selectedSessionId === s.id }"
                      @click="$store.gym.selectSession(s.id)"
                    >
                      <span
                        x-text="s.name"
                        style="
                          flex: 1;
                          overflow: hidden;
                          text-overflow: ellipsis;
                          white-space: nowrap;
                        "
                      ></span>
                      <div class="item-actions">
                        <button
                          class="btn-icon"
                          style="width: 22px; height: 22px"
                          title="Edit"
                          @click.stop="$store.gym.openModal('editSession', s.id)"
                        >
                          <svg
                            style="width: 12px; height: 12px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <path
                              d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"
                            />
                            <path
                              d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"
                            />
                          </svg>
                        </button>
                        <button
                          class="btn-icon"
                          style="
                            width: 22px;
                            height: 22px;
                            color: var(--danger);
                          "
                          title="Delete"
                          @click.stop="$store.gym.openModal('deleteSession', s.id)"
                        >
                          <svg
                            style="width: 12px; height: 12px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <polyline points="3 6 5 6 21 6" />
                            <path
                              d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"
                            />
                          </svg>
                        </button>
                      </div>
                    </div>
                  </template>
                  <div
                    x-show="$store.gym.selectedProgramId && !$store.gym.sessions.length"
                    style="
                      font-size: 0.8rem;
                      color: var(--text3);
                      padding: 8px 12px;
                    "
                  >
                    No days yet. Add one!
                  </div>
                  <div
                    x-show="!$store.gym.selectedProgramId"
                    style="
                      font-size: 0.8rem;
                      color: var(--text3);
                      padding: 8px 12px;
                    "
                  >
                    Select a program first.
                  </div>
                </div>
              </div>
            </aside>

            <!-- ════ MAIN CONTENT ══════════════════════════════════ -->
            <main
              style="
                flex: 1;
                display: flex;
                flex-direction: column;
                overflow: hidden;
              "
            >
              <!-- ──── WORKOUT / CONFIG VIEW ────────────────────── -->
              <template x-if="$store.gym.view === 'workout'">
                <div
                  style="
                    flex: 1;
                    display: flex;
                    flex-direction: column;
                    overflow: hidden;
                  "
                >
                  <!-- Toolbar -->
                  <div
                    style="
                      display: flex;
                      align-items: center;
                      gap: 10px;
                      padding: 10px 20px;
                      border-bottom: 1px solid var(--border);
                      background: var(--surface);
                      flex-shrink: 0;
                      flex-wrap: wrap;
                    "
                  >
                    <!-- Mode tabs -->
                    <div style="display: flex; gap: 16px; flex-shrink: 0">
                      <button
                        @click="$store.gym.mode='workout'"
                        :style="$store.gym.mode==='workout' ? 'color:var(--accent);background:var(--accent-bg);padding:8px 16px;border-radius:4px;display: flex;align-items: center;gap: 6px;' : 'color:var(--text3);display: flex;align-items: center;gap: 6px;'"
                        style="
                          display: flex;
                          align-items: center;
                          gap: 6px;
                          padding: 8px 16px;
                          border-radius: 4px;
                          font-size: 0.8rem;
                          font-weight: 500;
                          transition: var(--trans);
                        "
                      >
                        <svg
                          style="width: 14px; height: 14px; flex-shrink: 0"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                        >
                          <rect x="2" y="9" width="3" height="6" rx="1" />
                          <rect x="19" y="9" width="3" height="6" rx="1" />
                          <rect x="5" y="7" width="3" height="10" rx="1" />
                          <rect x="16" y="7" width="3" height="10" rx="1" />
                          <line x1="8" y1="12" x2="16" y2="12" />
                        </svg>
                        Workout
                      </button>
                      <button
                        @click="$store.gym.mode='config'"
                        :style="$store.gym.mode==='config' ? 'color:var(--accent);background:var(--accent-bg);padding:8px 16px;border-radius:4px;display: flex;align-items: center;gap: 6px;' : 'color:var(--text3);display: flex;align-items: center;gap: 6px;'"
                        style="
                          display: flex;
                          align-items: center;
                          gap: 6px;
                          padding: 8px 16px;
                          border-radius: 4px;
                          font-size: 0.8rem;
                          font-weight: 500;
                          transition: var(--trans);
                        "
                      >
                        <svg
                          style="width: 14px; height: 14px; flex-shrink: 0"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                        >
                          <circle cx="12" cy="12" r="3" />
                          <path
                            d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                          />
                        </svg>
                        Configure
                      </button>
                    </div>

                    <!-- Config-mode: exercise search -->
                    <div
                      x-show="$store.gym.mode==='config' && $store.gym.selectedSessionId"
                      style="
                        position: relative;
                        min-width: 200px;
                        max-width: 280px;
                      "
                      @click.outside="$store.gym.closeSearch()"
                    >
                      <input
                        type="text"
                        placeholder="Add exercise…"
                        :value="$store.gym.searchQuery"
                        @input="$store.gym.onSearch($event.target.value)"
                        @focus="$store.gym.searchOpen=true"
                        autocomplete="off"
                        style="width: 100%"
                      />
                      <div x-show="$store.gym.searchOpen" class="ac-dropdown">
                        <template
                          x-for="ex in $store.gym.filteredGlobal"
                          :key="ex.id"
                        >
                          <div
                            class="ac-item"
                            @click="$store.gym.addExerciseToSession(ex);$store.gym.closeSearch()"
                          >
                            <span x-text="ex.name"></span>
                            <span
                              style="font-size: 0.7rem; color: var(--text3)"
                              x-text="Array.isArray(ex.muscleGroups) ? ex.muscleGroups.join(', ') : ex.muscleGroups"
                            ></span>
                          </div>
                        </template>
                        <div
                          class="ac-item ac-add"
                          @click="$store.gym.openModal('addExercise', $store.gym.searchQuery);$store.gym.closeSearch()"
                        >
                          <svg
                            style="width: 14px; height: 14px; flex-shrink: 0"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <path d="M12 5v14M5 12h14" />
                          </svg>
                          <span
                            x-text="$store.gym.searchQuery ? `Add new: &quot;${$store.gym.searchQuery}&quot;` : 'Add new exercise…'"
                          ></span>
                        </div>
                      </div>
                    </div>

                    <!-- Config-mode: merge button -->
                    <template
                      x-if="$store.gym.mode==='config' && $store.gym.mergeSet.length >= 2"
                    >
                      <button
                        class="btn btn-primary btn-sm"
                        @click="$store.gym.mergeSuperset()"
                      >
                        <svg
                          style="width: 13px; height: 13px"
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                        >
                          <path d="M8 18L5 21l-3-3" />
                          <path d="M5 21V3" />
                          <path d="M16 6l3-3 3 3" />
                          <path d="M19 3v18" />
                          <path d="M5 12h14" />
                        </svg>
                        Merge (<span x-text="$store.gym.mergeSet.length"></span
                        >)
                      </button>
                    </template>

                    <!-- Workout-mode actions -->
                    <template
                      x-if="$store.gym.mode==='workout' && $store.gym.selectedSessionId"
                    >
                      <div style="display: flex; gap: 8px; align-items: center">
                        <button
                          class="btn btn-secondary btn-sm"
                          @click="$store.gym.openModal('weightGoals')"
                        >
                          <svg
                            style="width: 13px; height: 13px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <circle cx="12" cy="12" r="10" />
                            <circle cx="12" cy="12" r="6" />
                            <circle cx="12" cy="12" r="2" />
                          </svg>
                          Weight Goals
                        </button>
                        <button
                          class="btn btn-primary btn-sm"
                          @click="$store.gym.openModal('finishWorkout')"
                        >
                          <svg
                            style="width: 13px; height: 13px"
                            viewBox="0 0 24 24"
                            fill="none"
                            stroke="currentColor"
                            stroke-width="2"
                          >
                            <polyline points="20 6 9 17 4 12" />
                          </svg>
                          Finish Workout
                        </button>
                      </div>
                    </template>

                    <!-- Save indicator -->
                    <div
                      style="
                        margin-left: auto;
                        display: flex;
                        align-items: center;
                        gap: 6px;
                        font-size: 0.75rem;
                        color: var(--text3);
                      "
                    >
                      <div
                        class="save-dot"
                        :class="$store.gym.saveStatus === 'saving' ? 'dot-saving' : 'dot-saved'"
                      ></div>
                      <span
                        x-text="$store.gym.saveStatus === 'saving' ? 'Saving…' : 'Saved'"
                      ></span>
                    </div>
                  </div>

                  <!-- Content body -->
                  <div style="flex: 1; overflow-y: auto; padding: 16px 20px">
                    <!-- Empty state -->
                    <template x-if="!$store.gym.selectedSessionId">
                      <div class="empty-state">
                        <svg
                          viewBox="0 0 24 24"
                          fill="none"
                          stroke="currentColor"
                          stroke-width="2"
                        >
                          <rect x="2" y="9" width="3" height="6" rx="1" />
                          <rect x="19" y="9" width="3" height="6" rx="1" />
                          <rect x="5" y="7" width="3" height="10" rx="1" />

                <div
                  style="
                    display: flex;
                    justify-content: flex-end;
                    gap: 8px;
                    margin-top: 16px;
                  "
                >
                  <button
                    class="btn btn-secondary"
                    @click="$store.gym.closeModal()"
                  >
                    Cancel
                  </button>
                  <button
                    class="btn btn-primary"
                    @click="$store.gym.addCustomExercise()"
                  >
                    Add &amp; Insert
                  </button>
                </div>
              </div>

              <!-- Weight Goals -->
              <div x-show="$store.gym.modal?.type === 'weightGoals'">
                <h2
                  style="
                    font-size: 1.1rem;
                    font-weight: 700;
                    margin-bottom: 4px;
                  "
                >
                  Weight Goals
                </h2>
                <p
                  style="
                    color: var(--text3);
                    font-size: 0.8rem;
                    margin-bottom: 16px;
                  "
                >
                  Based on last workout + Load Increment (LI)
                </p>
                <div
                  x-show="!$store.gym.weightGoalRows().length"
                  style="color: var(--text3); text-align: center; padding: 20px"
                >
                  Work out at least once to generate goals.
                </div>
                <template
                  x-for="row in $store.gym.weightGoalRows()"
                  :key="row.name"
                >
                  <div style="margin-bottom: 14px">
                    <div
                      style="
                        font-weight: 600;
                        font-size: 0.9rem;
                        margin-bottom: 4px;
                        display: flex;
                        align-items: center;
                        gap: 8px;
                      "
                    >
                      <span x-text="row.name"></span>
                      <span
                        class="badge badge-warning"
                        x-text="'LI '+row.li+'kg'"
                        style="font-size: 0.65rem"
                      ></span>
                    </div>
                    <template x-for="s in row.sets" :key="s.key">
                      <div
                        style="
                          display: flex;
                          align-items: center;
                          justify-content: space-between;
                          padding: 5px 0;
                          border-bottom: 1px solid var(--border);
                          font-size: 0.85rem;
                        "
                      >
                        <span x-text="s.key" style="color: var(--text2)"></span>
                        <span
                          style="color: var(--text3)"
                          x-text="s.lastW+'kg'"
                        ></span>
                        <span style="color: var(--text3)">→</span>
                        <span
                          style="color: var(--accent); font-weight: 600"
                          x-text="s.goal+'kg'"
                        ></span>
                      </div>
                    </template>
                  </div>
                </template>
                <div
                  style="
                    display: flex;
                    justify-content: flex-end;
                    gap: 8px;
                    margin-top: 16px;
                  "
                >
                  <button
                    class="btn btn-secondary"
                    @click="$store.gym.closeModal()"
                  >
                    Close
                  </button>
                  <button
                    class="btn btn-primary"
                    x-show="$store.gym.weightGoalRows().length"
                    @click="$store.gym.applyWeightGoals()"
                  >
                    Apply Goals
                  </button>
                </div>
              </div>

              <!-- Finish Workout -->
              <div x-show="$store.gym.modal?.type === 'finishWorkout'">
                <h2
                  style="
                    font-size: 1.1rem;
                    font-weight: 700;
                    margin-bottom: 8px;
                  "
                >
                  Finish Workout
                </h2>
                <p
                  style="
                    color: var(--text2);
                    font-size: 0.9rem;
                    margin-bottom: 16px;
                  "
                >
                  This will save today's workout log and update your set
                  history.
                </p>
                <div style="display: flex; justify-content: flex-end; gap: 8px">
                  <button
                    class="btn btn-secondary"
                    @click="$store.gym.closeModal()"
                  >
                    Cancel
                  </button>
                  <button
                    class="btn btn-primary"
                    @click="$store.gym.finishWorkout()"
                  >
                    <svg
                      style="width: 13px; height: 13px"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <polyline points="20 6 9 17 4 12" />
                    </svg>
                    Save Workout
                  </button>
                </div>
              </div>
            </div>
            <!-- /modal-box -->
          </div>
          <!-- /modal overlay -->

          <!-- ════ TOAST NOTIFICATIONS ══════════════════════════════ -->
          <div
            style="
              position: fixed;
              bottom: 20px;
              right: 20px;
              z-index: 2000;
              display: flex;
              flex-direction: column;
              gap: 8px;
            "
          >
            <template x-for="t in $store.gym.toasts" :key="t.id">
              <div
                class="toast"
                :class="t.type==='error' ? 'toast-error' : 'toast-success'"
              >
                <svg
                  x-show="t.type!=='error'"
                  style="width: 14px; height: 14px; flex-shrink: 0"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <polyline points="20 6 9 17 4 12" />
                </svg>
                <svg
                  x-show="t.type==='error'"
                  style="width: 14px; height: 14px; flex-shrink: 0"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <path d="M18 6L6 18M6 6l12 12" />
                </svg>
                <span x-text="t.msg"></span>
              </div>
            </template>
          </div>
        </div>
        <!-- /app shell when loaded -->
      </template>
    </div>
    <!-- /x-data root -->

    <!-- Sidebar drawer -->
    <style>
      /* Sidebar pushes content — stays in flex flow */
      #sidebar {
        flex-shrink: 0;
        width: 0;
        overflow: hidden;
        transition: width 0.25s ease;
      }
      #sidebar.open {
        width: 280px;
      }
    </style>
    <script type="module">
      import Alpine from "https://cdn.jsdelivr.net/npm/alpinejs@3/dist/module.esm.js";
      import { registerStore } from "./js/store.js";

      registerStore(Alpine);

      window.Alpine = Alpine;
      Alpine.start();
    </script>
  </body>
</html>
